<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pickmeal</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5799856197009282"
     crossorigin="anonymous"></script>
</head>
<body>

  <div class="container">
    <div class="header">
      <img src="Pickmeal-transparent-logo.png" alt="Logo" class="logo-top">
    </div>

    <p class="subtitle">Let us decide your next meal</p>

    <div class="instructions">
      Adding more filters can improve your results. Leave filters on “Any” if you want wider suggestions.
    </div>

    <label><strong>Your Price Range</strong></label>
    <div class="price-inputs">
      <select id="minPriceType">
        <option value="">Any maximum</option>
        <option value="1">₱ (Budget)</option>
        <option value="2">₱₱ (Affordable)</option>
        <option value="3">₱₱₱ (Mid-range)</option>
        <option value="4">₱₱₱₱ (Premium)</option>
      </select>

      <select id="maxPriceType">
        <option value="">Any maximum</option>
        <option value="1">₱ (Budget)</option>
        <option value="2">₱₱ (Affordable)</option>
        <option value="3">₱₱₱ (Mid-range)</option>
        <option value="4">₱₱₱₱ (Premium)</option>
      </select>
    </div>

    <label><strong>Your Mood</strong></label>
    <select id="mood">
      <option value="any">Any</option>
      <option value="comfort">Comfort Food</option>
      <option value="solo">Solo Food</option>
      <option value="date">Date Food</option>
      <option value="quick">Quick Meal</option>
      <option value="hangout">Hangout Food</option>
      <option value="celebration">Celebration Food</option>
    </select>

    <label><strong>Your Course</strong></label>
    <select id="course">
      <option value="any">Any</option>
      <option value="main">Main</option>
      <option value="appetizer">Appetizer</option>
      <option value="dessert">Dessert</option>
    </select>

    <button onclick="pickFood()">Pick My Food</button>

    <div id="result" class="result-card loading">Loading food database...</div>
    <img id="foodImg" alt="Food image">

    <div class="mode-switch" onclick="toggleDarkMode()" id="modeToggle">Dark Mode 🌙</div>

    <ins class="adsbygoogle"
      style="display:block"
      data-ad-client="ca-pub-XXXXXXXX"
      data-ad-slot="1234567890"
      data-ad-format="auto"
      data-full-width-responsive="true"></ins>

    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <script>
    let foods = [];

    const SHEET_URL = "https://opensheet.elk.sh/1lvF1lf-2fY3mYvL_CYnA-vLy9VT5CV8lBnQI80XFL2o/Sheet1";

    fetch(SHEET_URL)
      .then(res => res.json())
      .then(data => {
        console.log("Loaded data:", data);

        foods = data.map(item => ({
          name: item.Name,
          priceType: item.PriceType,
          mood: item.Mood,
          course: item.Course,
          image: item.Image
        }));

        const resultBox = document.getElementById("result");
        resultBox.classList.remove("loading");
        resultBox.innerText = "Click the button to decide!";
      })
      .catch(err => {
        console.error("Error loading sheet:", err);
        document.getElementById("result").innerText = "Failed to load food database 😢";
      });

    function pickFood() {
      if (foods.length === 0) {
        showResultMessage("Still loading food database...");
        return;
      }

      const minPriceTypeValue = document.getElementById("minPriceType").value;
      const maxPriceTypeValue = document.getElementById("maxPriceType").value;
      const mood = document.getElementById("mood").value;
      const course = document.getElementById("course").value;

      const minPriceType = minPriceTypeValue === "" ? null : Number(minPriceTypeValue);
      const maxPriceType = maxPriceTypeValue === "" ? null : Number(maxPriceTypeValue);

      if (minPriceType !== null && maxPriceType !== null && minPriceType > maxPriceType) {
        showResultMessage("Minimum price range cannot be higher than maximum.");
        document.getElementById("foodImg").style.display = "none";
        return;
      }

      const filtered = foods.filter(food => {
        const priceList = (food.priceType || "")
          .split(",")
          .map(p => Number(p.trim()))
          .filter(p => !isNaN(p));

        const moodList = (food.mood || "")
          .split(",")
          .map(m => m.trim().toLowerCase());

        const courseList = (food.course || "")
          .split(",")
          .map(c => c.trim().toLowerCase());

        const matchesMinPrice =
          minPriceType === null || priceList.some(p => p >= minPriceType);

        const matchesMaxPrice =
          maxPriceType === null || priceList.some(p => p <= maxPriceType);

        const matchesMood =
          mood === "any" || moodList.includes(mood);

        const matchesCourse =
          course === "any" || courseList.includes(course);

        return matchesMinPrice && matchesMaxPrice && matchesMood && matchesCourse;
      });

      if (filtered.length === 0) {
        showResultMessage("No match 😢 Try adjusting your filters.");
        document.getElementById("foodImg").style.display = "none";
        return;
      }

      showResultMessage("Choosing your food... 🍽️");
      document.getElementById("foodImg").style.display = "none";

      setTimeout(() => {
        const random = filtered[Math.floor(Math.random() * filtered.length)];

        const richMessage = maxPriceType === 4
          ? '<div class="rich-message">💰 Congratulations, you are rich 😎. SANA ALL PO!</div>'
          : "";

        const resultHTML = `
          <div class="result-label">🍜 You should eat:</div>
          <div class="result-food">${random.name}</div>
          <div class="result-price">${getPriceLabel(random.priceType)}</div>
          ${richMessage}
        `;

        showResultMessage(resultHTML, true);

        if (random.image) {
          const img = document.getElementById("foodImg");
          img.src = random.image;
          img.style.display = "block";
          img.classList.remove("animate-image");
          void img.offsetWidth;
          img.classList.add("animate-image");
        }
      }, 1200);
    }

    function showResultMessage(message, isHTML = false) {
      const resultBox = document.getElementById("result");

      // animation reset
      resultBox.classList.remove("animate-result");
      void resultBox.offsetWidth;
      resultBox.classList.add("animate-result");

      // 👉 ADD THIS (controls size)
      if (message === "Click the button to decide!" || message.includes("Choosing")) {
        resultBox.classList.remove("active");
      } else {
        resultBox.classList.add("active");
      }

      if (isHTML) {
        resultBox.innerHTML = message;
      } else {
        resultBox.innerText = message;
      }
    }

    function getPriceLabel(priceType) {
      const labels = {
        1: "₱ (Budget)",
        2: "₱₱ (Affordable)",
        3: "₱₱₱ (Mid-range)",
        4: "₱₱₱₱ (Premium)"
      };

      const prices = (priceType + "")
        .split(",")
        .map(p => Number(p.trim()))
        .filter(p => !isNaN(p));

      if (prices.length === 0) return "";

      return prices.map(p => labels[p]).join(" - ");
    }

    function toggleDarkMode() {
      document.body.classList.toggle("dark");

      const toggleText = document.getElementById("modeToggle");
      if (document.body.classList.contains("dark")) {
        toggleText.innerText = "Light Mode ☀️";
      } else {
        toggleText.innerText = "Dark Mode 🌙";
      }
    }
  </script>

</body>
</html>
